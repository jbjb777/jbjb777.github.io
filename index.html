<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JBJB</title>
<link rel="icon" type="image/svg+xml" href="./logo.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 24px;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 32px;
    max-width: 480px;
    width: 100%;
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .text-block {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .code {
    font-size: 50px;
    font-weight: 700;
    letter-spacing: -3px;
    color: #fff;
    line-height: 1;
  }

  .message {
    font-size: 22px;
    font-weight: 400;
    color: #555;
    letter-spacing: -0.3px;
    line-height: 1.4;
  }

  .github {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #646464;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.2px;
  }




  .insta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ffffff;
    color: #000000;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.2px;
  }

 .treads {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #ffffff;
    color: #000000;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.2px;
  }


  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    color: #000;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 24px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.2px;
  }
  .btn-home:hover { background: #ddd; }
  .btn-home:active { transform: scale(0.94); }

  .btn-home svg {
    flex-shrink: 0;
  }





.github, .insta, .treads{
  transition: 
    transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.2s ease,
    background 0.2s ease;
}

/* 마우스 올렸을 때 */
.github:hover, .insta:hover, .treads:hover{
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* 클릭할 때 */
.github:active, .insta:active, .treads:active{
  transform: scale(0.92);
}


.socials img {
  width: 20px;
  height: 20px;
  object-fit: contain; /* 비율 유지 */
}



</style>
</head>
<body>

<div class="container">
  <div class="text-block">

    <span class="message">웹사이트 등을 개발하는 중2(본명:엄정빈)</span>
  </div>
